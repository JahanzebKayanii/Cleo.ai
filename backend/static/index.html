<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cleo — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #f5f5f9; color: #111; }
    .sidebar { background: #fff; border-right: 1px solid #e8e8f0; }
    .card { background: #fff; border: 1px solid #e8e8f0; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
    .card-glow { box-shadow: 0 4px 20px rgba(16,185,129,0.08); }
    .nav-item { color: #888; transition: all 0.15s; }
    .nav-item:hover, .nav-item.active { color: #10b981; background: #ecfdf5; }
    .table-row:hover { background: #faf9ff; }
    .stat-value { color: #10b981; }
    main { background: #f5f5f9; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #f5f5f9; } ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
  </style>
</head>
<body class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside class="sidebar w-56 flex-shrink-0 flex flex-col h-screen">
    <div class="px-5 py-5 border-b border-[#e8e8f0]">
      <div class="flex items-center gap-2.5">
        <svg viewBox="0 0 80 80" width="28" height="28" fill="none"><rect width="80" height="80" rx="18" fill="#10b981"/><rect x="12" y="32" width="8" height="16" rx="4" fill="white" opacity="0.5"/><rect x="24" y="22" width="8" height="36" rx="4" fill="white" opacity="0.75"/><rect x="36" y="14" width="8" height="52" rx="4" fill="white"/><rect x="48" y="22" width="8" height="36" rx="4" fill="white" opacity="0.75"/><rect x="60" y="32" width="8" height="16" rx="4" fill="white" opacity="0.5"/></svg>
        <span class="font-semibold text-[#111] text-sm">Cleo</span>
      </div>
    </div>

    <nav class="flex-1 px-3 py-4 space-y-0.5">
      <a href="/dashboard/" class="nav-item active flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </a>
      <a href="/dashboard/calls.html" class="nav-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
        Calls
      </a>
      <a href="/dashboard/knowledge.html" class="nav-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        Knowledge Base
      </a>
      <a href="/dashboard/config.html" class="nav-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
        Config
      </a>
      <a id="admin-link" href="/dashboard/admin.html" class="hidden nav-item flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Tenants
      </a>
    </nav>

    <div class="px-3 py-4 border-t border-[#e8e8f0]">
      <div class="px-3 py-2">
        <p class="text-xs text-[#444]" id="sidebar-biz">Apex Home Services</p>
        <div class="flex items-center justify-between mt-1">
          <div class="flex items-center gap-1.5">
            <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
            <span class="text-xs text-[#555]">Live</span>
          </div>
          <a href="/auth/logout" class="text-xs text-[#444] hover:text-red-400 transition">sign out</a>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 overflow-y-auto">
    <div class="px-8 py-8 max-w-5xl">

      <!-- Header -->
      <div class="mb-8">
        <h1 class="text-xl font-semibold text-[#111]">Overview</h1>
        <p class="text-sm text-[#555] mt-0.5">Real-time analytics for Cleo</p>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-4 gap-4 mb-8">
        <div class="card rounded-xl p-5">
          <p class="text-xs text-[#555] mb-3 uppercase tracking-widest">Total Calls</p>
          <p class="text-3xl font-semibold stat-value" id="s-total">—</p>
        </div>
        <div class="card rounded-xl p-5">
          <p class="text-xs text-[#555] mb-3 uppercase tracking-widest">This Week</p>
          <p class="text-3xl font-semibold stat-value" id="s-week">—</p>
        </div>
        <div class="card rounded-xl p-5">
          <p class="text-xs text-[#555] mb-3 uppercase tracking-widest">Today</p>
          <p class="text-3xl font-semibold stat-value" id="s-today">—</p>
        </div>
        <div class="card rounded-xl p-5">
          <p class="text-xs text-[#555] mb-3 uppercase tracking-widest">Unique Callers</p>
          <p class="text-3xl font-semibold stat-value" id="s-unique">—</p>
        </div>
      </div>

      <!-- Charts row -->
      <div class="grid grid-cols-5 gap-4 mb-8">
        <div class="card rounded-xl p-5 col-span-3">
          <p class="text-sm font-medium text-[#111] mb-4">Call Volume — Last 14 Days</p>
          <canvas id="chart-daily" height="120"></canvas>
        </div>
        <div class="card rounded-xl p-5 col-span-2">
          <p class="text-sm font-medium text-[#111] mb-4">Peak Hours</p>
          <canvas id="chart-hourly" height="120"></canvas>
        </div>
      </div>

      <!-- Service breakdown + recent calls -->
      <div class="grid grid-cols-5 gap-4">
        <div class="card rounded-xl p-5 col-span-2">
          <p class="text-sm font-medium text-[#111] mb-5">By Service</p>
          <div id="service-breakdown" class="space-y-3"></div>
        </div>
        <div class="card rounded-xl col-span-3 overflow-hidden">
          <div class="px-5 py-4 border-b border-[#e8e8f0]">
            <p class="text-sm font-medium text-[#111]">Recent Calls</p>
          </div>
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-[#e8e8f0]">
                <th class="text-left px-5 py-3 text-xs text-[#888] font-medium uppercase tracking-wider">Caller</th>
                <th class="text-left px-5 py-3 text-xs text-[#888] font-medium uppercase tracking-wider">Status</th>
                <th class="text-left px-5 py-3 text-xs text-[#888] font-medium uppercase tracking-wider">When</th>
              </tr>
            </thead>
            <tbody id="recent-calls"></tbody>
          </table>
        </div>
      </div>

    </div>
  </main>

  <script>
    const API = window.location.origin;
    const VIOLET = '#10b981';
    const GRID = '#e8e8f0';
    const TEXT = '#555';
    Chart.defaults.color = TEXT;
    Chart.defaults.borderColor = GRID;

    // Tenant context: ?bid= overrides for admin, else use session
    let _bid = null;
    async function getBid() {
      if (_bid !== null) return _bid;
      const p = new URLSearchParams(window.location.search);
      if (p.has('bid')) { _bid = +p.get('bid'); return _bid; }
      const s = await fetch(`${API}/auth/session`).then(r => r.json()).catch(() => ({}));
      _bid = s.business_id || 1;
      // Show admin link if admin
      if (s.role === 'admin') {
        const adminLink = document.getElementById('admin-link');
        if (adminLink) adminLink.classList.remove('hidden');
      }
      return _bid;
    }

    function fmt(h) {
      const ampm = h < 12 ? 'AM' : 'PM';
      return `${h % 12 || 12}${ampm}`;
    }
    function timeAgo(d) {
      const diff = Math.floor((Date.now() - new Date(d)) / 1000);
      if (diff < 60) return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
      return new Date(d).toLocaleDateString();
    }
    function badge(status) {
      const m = { completed:'text-green-700 bg-green-100', in_progress:'text-emerald-700 bg-emerald-100', failed:'text-red-600 bg-red-100' };
      return `<span class="px-2 py-0.5 rounded text-xs font-medium ${m[status]||'text-gray-600 bg-gray-100'}">${status.replace('_',' ')}</span>`;
    }

    let dailyChart, hourlyChart;

    async function load() {
      const bid = await getBid();
      const [analytics, calls, config] = await Promise.all([
        fetch(`${API}/analytics/overview?business_id=${bid}`).then(r => r.json()),
        fetch(`${API}/calls/?business_id=${bid}`).then(r => r.json()),
        fetch(`${API}/business/config?business_id=${bid}`).then(r => r.json()),
      ]);
      if (config.name) document.getElementById('sidebar-biz').textContent = config.name;

      // Stats
      document.getElementById('s-total').textContent = analytics.total_calls;
      document.getElementById('s-week').textContent = analytics.calls_this_week;
      document.getElementById('s-today').textContent = analytics.calls_today;
      document.getElementById('s-unique').textContent = analytics.unique_callers;

      // Daily chart
      const labels = analytics.calls_by_day.map(d => {
        const dt = new Date(d.date + 'T00:00:00');
        return dt.toLocaleDateString('en', { month: 'short', day: 'numeric' });
      });
      const data = analytics.calls_by_day.map(d => d.count);

      if (dailyChart) dailyChart.destroy();
      dailyChart = new Chart(document.getElementById('chart-daily'), {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data,
            borderColor: VIOLET,
            backgroundColor: 'rgba(16,185,129,0.08)',
            fill: true,
            tension: 0.4,
            pointRadius: 3,
            pointBackgroundColor: VIOLET,
          }]
        },
        options: { plugins: { legend: { display: false } }, scales: { x: { grid: { color: GRID } }, y: { grid: { color: GRID }, beginAtZero: true, ticks: { stepSize: 1 } } } }
      });

      // Hourly chart
      const hLabels = analytics.calls_by_hour.map(h => fmt(h.hour));
      const hData = analytics.calls_by_hour.map(h => h.count);

      if (hourlyChart) hourlyChart.destroy();
      hourlyChart = new Chart(document.getElementById('chart-hourly'), {
        type: 'bar',
        data: {
          labels: hLabels,
          datasets: [{
            data: hData,
            backgroundColor: 'rgba(16,185,129,0.5)',
            borderColor: VIOLET,
            borderWidth: 1,
            borderRadius: 3,
          }]
        },
        options: { plugins: { legend: { display: false } }, scales: { x: { grid: { display: false } }, y: { grid: { color: GRID }, beginAtZero: true, ticks: { stepSize: 1 } } } }
      });

      // Service breakdown
      const svc = analytics.service_breakdown;
      const total = Object.values(svc).reduce((a, b) => a + b, 0) || 1;
      const colors = { HVAC: 'bg-emerald-500', Plumbing: 'bg-blue-500', Electrical: 'bg-yellow-500', Other: 'bg-gray-600' };
      document.getElementById('service-breakdown').innerHTML = Object.entries(svc).map(([k, v]) => `
        <div>
          <div class="flex justify-between text-xs mb-1.5">
            <span class="text-[#888]">${k}</span>
            <span class="text-[#111] font-medium">${v}</span>
          </div>
          <div class="w-full h-1.5 bg-[#e8e8f0] rounded-full overflow-hidden">
            <div class="h-full ${colors[k]||'bg-gray-500'} rounded-full" style="width:${Math.round(v/total*100)}%"></div>
          </div>
        </div>
      `).join('');

      // Recent calls
      const recent = calls.slice(0, 8);
      document.getElementById('recent-calls').innerHTML = recent.length
        ? recent.map(c => `
          <tr class="table-row border-t border-[#e8e8f0] cursor-pointer" onclick="location.href='/dashboard/calls.html'">
            <td class="px-5 py-3 text-[#111] font-medium">${c.customer_name || c.customer_phone || 'Unknown'}</td>
            <td class="px-5 py-3">${badge(c.status)}</td>
            <td class="px-5 py-3 text-[#555] text-xs">${timeAgo(c.started_at)}</td>
          </tr>`).join('')
        : `<tr><td colspan="3" class="px-5 py-10 text-center text-[#444] text-sm">No calls yet</td></tr>`;
    }

    load();
    setInterval(load, 15000);
  </script>
</body>
</html>
