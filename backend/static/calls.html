    .table-row:hover { background: #f0fdf4; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #f5f5f9; } ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

<body class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <aside class="sidebar w-56 flex-shrink-0 flex flex-col h-screen">
    <div class="px-5 py-5 border-b border-[#e8e8f0]">
      <div class="flex items-center gap-2.5">
        <svg viewBox="0 0 80 80" width="28" height="28" fill="none"><rect width="80" height="80" rx="18" fill="#10b981"/><rect x="12" y="32" width="8" height="16" rx="4" fill="white" opacity="0.5"/><rect x="24" y="22" width="8" height="36" rx="4" fill="white" opacity="0.75"/><rect x="36" y="14" width="8" height="52" rx="4" fill="white"/><rect x="48" y="22" width="8" height="36" rx="4" fill="white" opacity="0.75"/><rect x="60" y="32" width="8" height="16" rx="4" fill="white" opacity="0.5"/></svg>
        <span class="font-semibold text-[#111] text-sm">Cleo</span>
      </div>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-0.5">
      <a href="/dashboard/" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-[#666] hover:text-emerald-600 hover:bg-emerald-50 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </a>
      <a href="/dashboard/calls.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-emerald-600 bg-emerald-50">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
        Calls
      </a>
      <a href="/dashboard/knowledge.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-[#666] hover:text-emerald-600 hover:bg-emerald-50 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        Knowledge Base
      </a>
      <a id="admin-link" href="/dashboard/admin.html" class="hidden flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-[#666] hover:text-emerald-600 hover:bg-emerald-50 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        Tenants
      </a>
      <a href="/dashboard/config.html" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-[#666] hover:text-emerald-600 hover:bg-emerald-50 transition">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
        Config
      </a>
    </nav>
    <div class="px-3 py-4 border-t border-[#e8e8f0]">
      <div class="px-3 py-2">
        <p class="text-xs text-[#444]" id="sidebar-biz">Apex Home Services</p>
        <div class="flex items-center justify-between mt-1">
          <div class="flex items-center gap-1.5">
            <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
            <span class="text-xs text-[#555]">Live</span>
          </div>
          <a href="/auth/logout" class="text-xs text-[#444] hover:text-red-400 transition">sign out</a>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 overflow-y-auto">
    <div class="px-8 py-8 max-w-5xl">
      <div id="tenant-switcher" class="hidden flex items-center gap-2 mb-6 p-3 bg-white border border-[#e8e8f0] rounded-xl">
        <span class="text-xs text-[#888] font-medium">Viewing:</span>
        <select id="tenant-select" onchange="switchTenant(this.value)" class="flex-1 text-sm border border-[#e5e7eb] rounded-lg px-3 py-1.5 bg-white text-[#111] focus:outline-none focus:border-emerald-500"></select>
        <span class="text-xs text-emerald-600 font-medium">Admin</span>
      </div>
      <div class="mb-8">
        <h1 class="text-xl font-semibold text-[#111]">Calls</h1>
        <p class="text-sm text-[#555] mt-0.5">All inbound calls handled by Cleo</p>
      </div>

      <!-- Selected call transcript panel -->
      <div id="transcript-panel" class="hidden card rounded-xl p-6 mb-6">
        <div class="flex items-center justify-between mb-4">
          <div>
            <p class="text-[#111] font-medium" id="tp-name"></p>
            <p class="text-xs text-[#666] mt-0.5" id="tp-meta"></p>
          </div>
          <div class="flex items-center gap-3">
            <button id="tp-push-btn" onclick="pushIntegrations()" class="text-xs text-emerald-600 border border-emerald-200 hover:bg-emerald-50 px-3 py-1 rounded-lg transition">Push to integrations</button>
            <button onclick="closePanel()" class="text-[#888] hover:text-red-500 text-xs transition">âœ• Close</button>
          </div>
        </div>
        <div id="tp-summary" class="text-sm text-[#444] mb-4 p-4 bg-[#f5f5f9] rounded-lg border border-[#e8e8f0]"></div>
        <div id="tp-recording-wrap" class="mb-4">
          <p class="text-xs text-[#888] font-medium uppercase tracking-wider mb-2">Recording</p>
          <audio id="tp-audio" controls class="w-full" style="height:36px;accent-color:#10b981"></audio>
          <p id="tp-no-rec" class="hidden text-xs text-[#bbb] mt-1">No recording available for this call.</p>
        </div>
        <div id="tp-transcript" class="text-xs text-[#555] whitespace-pre-wrap leading-relaxed max-h-64 overflow-y-auto p-4 bg-[#f5f5f9] rounded-lg border border-[#e8e8f0] font-mono"></div>
      </div>

      <div class="card rounded-xl overflow-hidden">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-[#e8e8f0]">
              <th class="text-left px-6 py-3 text-xs text-[#888] font-medium uppercase tracking-wider">Caller</th>
              <th class="text-left px-6 py-3 text-xs text-[#888] font-medium uppercase tracking-wider">Phone</th>
              <th class="text-left px-6 py-3 text-xs text-[#888] font-medium uppercase tracking-wider">Status</th>
              <th class="text-left px-6 py-3 text-xs text-[#888] font-medium uppercase tracking-wider">When</th>
              <th class="text-left px-6 py-3 text-xs text-[#888] font-medium uppercase tracking-wider">Summary</th>
            </tr>
          </thead>
          <tbody id="calls-table">
            <tr><td colspan="5" class="px-6 py-12 text-center text-[#444]">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const API = window.location.origin;

    let _bid = null;
    let _sessionRole = null;
    async function getBid() {
      if (_bid !== null) return _bid;
      const sr = await fetch(`${API}/auth/session`);
      if (sr.status === 401) { window.location.href = '/dashboard/login.html'; return 1; }
      const s = await sr.json().catch(() => ({}));
      if (!s.authenticated) { window.location.href = '/dashboard/login.html'; return 1; }
      _sessionRole = s.role;
      // URL ?bid= overrides session business_id (only meaningful for admins; tenants get 403 from API anyway)
      const p = new URLSearchParams(window.location.search);
      _bid = p.has('bid') ? +p.get('bid') : (s.business_id || 1);
      // Reveal admin link + carry bid through all sidebar nav links
      if (s.role === 'admin') {
        const al = document.getElementById('admin-link');
        if (al) al.classList.remove('hidden');
      }
      const navBid = _bid;
      document.querySelectorAll('aside a[href^="/dashboard/"]').forEach(a => {
        const u = new URL(a.href, window.location.origin);
        if (!u.searchParams.has('bid')) {
          u.searchParams.set('bid', navBid);
          a.href = u.pathname + u.search;
        }
      });
      await initTenantSwitcher();
      return _bid;
    }

    function timeAgo(d) {
      const diff = Math.floor((Date.now() - new Date(d)) / 1000);
      if (diff < 60) return `${diff}s ago`;
      if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
      return new Date(d).toLocaleDateString();
    }
    function badge(status) {
      const m = { completed:'text-green-700 bg-green-100', in_progress:'text-emerald-700 bg-emerald-100', failed:'text-red-600 bg-red-100' };
      return `<span class="px-2 py-0.5 rounded text-xs font-medium ${m[status]||'text-gray-600 bg-gray-100'}">${status.replace('_',' ')}</span>`;
    }

    function closePanel() {
      document.getElementById('transcript-panel').classList.add('hidden');
    }

    let currentCallId = null;

    async function pushIntegrations() {
      const btn = document.getElementById('tp-push-btn');
      btn.textContent = 'Pushing...';
      btn.disabled = true;
      const res = await fetch(`${API}/calls/${currentCallId}/push-integrations`, { method: 'POST' });
      btn.textContent = res.ok ? 'Done âœ“' : 'Failed âœ—';
      btn.disabled = false;
    }

    async function openCall(id) {
      currentCallId = id;
      const res = await fetch(`${API}/calls/${id}`);
      const c = await res.json();
      document.getElementById('tp-name').textContent = c.customer_name || c.phone || 'Unknown';
      document.getElementById('tp-meta').textContent = `#${id} Â· ${c.phone || ''} Â· ${timeAgo(c.started_at)}`;
      document.getElementById('tp-push-btn').textContent = 'Push to integrations';
      document.getElementById('tp-push-btn').disabled = false;
      document.getElementById('tp-summary').textContent = c.summary || 'No summary yet.';
      document.getElementById('tp-transcript').textContent = c.transcript || 'No transcript.';

      const audio = document.getElementById('tp-audio');
      const noRec = document.getElementById('tp-no-rec');
      audio.classList.remove('hidden');
      noRec.classList.add('hidden');
      audio.src = `${API}/calls/${id}/recording`;
      audio.onerror = () => {
        audio.classList.add('hidden');
        noRec.classList.remove('hidden');
      };

      document.getElementById('transcript-panel').classList.remove('hidden');
      document.getElementById('transcript-panel').scrollIntoView({ behavior: 'smooth' });
    }


    async function initTenantSwitcher() {
      const s = await fetch(API + '/auth/session').then(r => r.json()).catch(() => ({}));
      if (s.role !== 'admin') return;
      const tenants = await fetch(API + '/admin/tenants').then(r => r.json()).catch(() => []);
      if (!tenants.length) return;
      const p = new URLSearchParams(window.location.search);
      const currentBid = p.has('bid') ? +p.get('bid') : (_bid || 1);
      const select = document.getElementById('tenant-select');
      tenants.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.id;
        opt.textContent = t.name + (t.is_active ? '' : ' (paused)');
        opt.selected = t.id === currentBid;
        select.appendChild(opt);
      });
      document.getElementById('tenant-switcher').classList.remove('hidden');
      document.getElementById('tenant-switcher').classList.add('flex');
    }

    function switchTenant(bid) {
      const url = new URL(window.location.href);
      url.searchParams.set('bid', bid);
      window.location.href = url.toString();
    }

    async function load() {
      const bid = await getBid();
      const [calls, config] = await Promise.all([
        fetch(`${API}/calls/?business_id=${bid}`).then(r => r.json()),
        fetch(`${API}/business/config?business_id=${bid}`).then(r => r.json()),
      ]);
      if (config.name) document.getElementById('sidebar-biz').textContent = config.name;
      const tbody = document.getElementById('calls-table');
      if (!calls.length) {
        tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-[#444]">No calls yet</td></tr>`;
        return;
      }
      tbody.innerHTML = calls.map(c => `
        <tr class="table-row border-t border-[#e8e8f0] cursor-pointer" onclick="openCall(${c.id})">
          <td class="px-6 py-3.5 text-[#111] font-medium">${c.customer_name || 'â€”'}</td>
          <td class="px-6 py-3.5 text-[#666] font-mono text-xs">${c.customer_phone || 'â€”'}</td>
          <td class="px-6 py-3.5">${badge(c.status)}</td>
          <td class="px-6 py-3.5 text-[#555] text-xs">${timeAgo(c.started_at)}</td>
          <td class="px-6 py-3.5 text-[#555] text-xs max-w-xs truncate">${c.summary || 'â€”'}</td>
        </tr>`).join('');
    }

    load();
    setInterval(load, 10000);
  </script>
</body>
