<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="Satoshi, Arial, sans-serif">
  <rect width="900" height="540" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="20" font-weight="800" fill="#111">How a Call Flows Through Cleo</text>

  <!-- Caller -->
  <g>
    <rect x="370" y="60" width="160" height="50" rx="14" fill="#f2ede5"/>
    <text x="450" y="91" text-anchor="middle" font-size="15" font-weight="700" fill="#111">📞 Caller</text>
  </g>
  <line x1="450" y1="110" x2="450" y2="138" stroke="#bbb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Twilio -->
  <g>
    <rect x="350" y="140" width="200" height="50" rx="14" fill="#111"/>
    <text x="450" y="171" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Twilio (phone + audio)</text>
  </g>
  <line x1="450" y1="190" x2="450" y2="218" stroke="#bbb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Deepgram -->
  <g>
    <rect x="320" y="220" width="260" height="50" rx="14" fill="#10b981"/>
    <text x="450" y="251" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Deepgram nova-2 — speech to text</text>
  </g>
  <line x1="450" y1="270" x2="450" y2="298" stroke="#bbb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- FastAPI core box with branches -->
  <g>
    <rect x="250" y="300" width="400" height="120" rx="16" fill="#fff" stroke="#10b981" stroke-width="2"/>
    <text x="450" y="328" text-anchor="middle" font-size="15" font-weight="800" fill="#111">FastAPI Backend</text>

    <rect x="275" y="345" width="160" height="50" rx="12" fill="#f2ede5"/>
    <text x="355" y="367" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111">Qdrant</text>
    <text x="355" y="384" text-anchor="middle" font-size="11" fill="#555">knowledge search (RAG)</text>

    <rect x="465" y="345" width="160" height="50" rx="12" fill="#f2ede5"/>
    <text x="545" y="367" text-anchor="middle" font-size="12.5" font-weight="700" fill="#111">Claude Sonnet</text>
    <text x="545" y="384" text-anchor="middle" font-size="11" fill="#555">reasoning + tool calls</text>
  </g>
  <line x1="450" y1="420" x2="450" y2="448" stroke="#bbb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- TTS back to caller -->
  <g>
    <rect x="320" y="450" width="260" height="50" rx="14" fill="#10b981"/>
    <text x="450" y="481" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Text to speech → back to caller</text>
  </g>

  <!-- Side branch: after-call automation -->
  <line x1="650" y1="360" x2="760" y2="360" stroke="#bbb" stroke-width="2" marker-end="url(#arrow)"/>
  <g>
    <rect x="690" y="120" width="190" height="220" rx="14" fill="#f7f5f1" stroke="#ddd"/>
    <text x="785" y="148" text-anchor="middle" font-size="13" font-weight="800" fill="#111">After the call</text>

    <rect x="710" y="165" width="150" height="36" rx="9" fill="#fff" stroke="#ddd"/>
    <text x="785" y="188" text-anchor="middle" font-size="12" fill="#333">Postgres — transcript</text>

    <rect x="710" y="210" width="150" height="36" rx="9" fill="#fff" stroke="#ddd"/>
    <text x="785" y="233" text-anchor="middle" font-size="12" fill="#333">CRM / Calendar sync</text>

    <rect x="710" y="255" width="150" height="36" rx="9" fill="#fff" stroke="#ddd"/>
    <text x="785" y="278" text-anchor="middle" font-size="12" fill="#333">SMS confirmation</text>

    <rect x="710" y="300" width="150" height="30" rx="9" fill="#fff" stroke="#ddd"/>
    <text x="785" y="320" text-anchor="middle" font-size="12" fill="#333">Email summary</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#bbb"/>
    </marker>
  </defs>
</svg>
