<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="Satoshi, Arial, sans-serif">
  <rect width="900" height="320" fill="#ffffff"/>

  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="800" fill="#111">When the Caller First Hears a Reply</text>

  <!-- Time axis -->
  <line x1="180" y1="280" x2="820" y2="280" stroke="#ccc" stroke-width="1.5"/>
  <text x="180" y="300" text-anchor="middle" font-size="12" fill="#888">0s</text>
  <text x="393" y="300" text-anchor="middle" font-size="12" fill="#888">1s</text>
  <text x="606" y="300" text-anchor="middle" font-size="12" fill="#888">2s</text>
  <text x="820" y="300" text-anchor="middle" font-size="12" fill="#888">3s</text>

  <!-- WITHOUT STREAMING -->
  <text x="60" y="110" font-size="14" font-weight="700" fill="#111">Without</text>
  <text x="60" y="128" font-size="14" font-weight="700" fill="#111">streaming</text>

  <rect x="180" y="90" width="640" height="46" rx="8" fill="#e9e5de"/>
  <text x="500" y="118" text-anchor="middle" font-size="13" fill="#777">silence — caller waits for the full response (~3s)</text>

  <rect x="780" y="90" width="40" height="46" rx="8" fill="#bbb"/>
  <text x="800" y="118" text-anchor="middle" font-size="11" fill="#fff" font-weight="700">reply</text>

  <!-- WITH STREAMING -->
  <text x="60" y="210" font-size="14" font-weight="700" fill="#111">With</text>
  <text x="60" y="228" font-size="14" font-weight="700" fill="#111">streaming</text>

  <rect x="180" y="190" width="213" height="46" rx="8" fill="#e9e5de"/>
  <text x="286" y="218" text-anchor="middle" font-size="12" fill="#888">thinking…</text>

  <rect x="180" y="190" width="0" height="46" rx="8" fill="#10b981"/>

  <rect x="393" y="190" width="427" height="46" rx="8" fill="#10b981" opacity="0.18"/>
  <rect x="380" y="184" width="26" height="58" rx="6" fill="#10b981"/>
  <text x="393" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#10b981">first sentence spoken ↓</text>
  <text x="606" y="218" text-anchor="middle" font-size="13" fill="#0a7a56">Cleo is already talking — rest finishes in the background</text>

  <!-- Legend note -->
  <text x="450" y="280" text-anchor="middle" font-size="0"></text>
</svg>
